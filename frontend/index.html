<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ResumeIQ — AI-Powered ATS Resume Analyzer</title>

  <!-- React from CDN — no build tool needed -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.min.js"></script>
  <!-- Babel — converts JSX to regular JavaScript in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Recharts — the charting library used in the dashboard -->
  
  <script type="text/babel" src="/frontend/app.jsx"></script>

  <style>
    /* Reset and base styles */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                  'Helvetica Neue', Arial, sans-serif;
      background: #f8f9fa;
      color: #1a1a2e;
      line-height: 1.6;
    }

    /* CSS Variables — these mimic the claude.ai design system
       so the React component works in both environments */
    :root {
      --color-background-primary:   #ffffff;
      --color-background-secondary: #f4f4f8;
      --color-background-tertiary:  #f8f9fa;
      --color-text-primary:         #1a1a2e;
      --color-text-secondary:       #6b7280;
      --color-text-tertiary:        #9ca3af;
      --color-border-tertiary:      rgba(0,0,0,0.08);
      --color-border-secondary:     rgba(0,0,0,0.15);
      --color-border-primary:       rgba(0,0,0,0.25);
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --border-radius-md: 8px;
      --border-radius-lg: 12px;
      --border-radius-xl: 16px;
    }

    /* Dark mode support */
    @media (prefers-color-scheme: dark) {
      :root {
        --color-background-primary:   #1e1e2e;
        --color-background-secondary: #2a2a3e;
        --color-background-tertiary:  #16161e;
        --color-text-primary:         #e2e8f0;
        --color-text-secondary:       #94a3b8;
        --color-text-tertiary:        #64748b;
        --color-border-tertiary:      rgba(255,255,255,0.08);
        --color-border-secondary:     rgba(255,255,255,0.15);
      }
      body { background: #16161e; color: #e2e8f0; }
    }

    /* Smooth scrolling */
    html { scroll-behavior: smooth; }

    /* Button base reset */
    button { font-family: inherit; }

    /* Input base reset */
    input, textarea, select {
      font-family: inherit;
      border: 0.5px solid var(--color-border-secondary);
      border-radius: var(--border-radius-md);
      background: var(--color-background-primary);
      color: var(--color-text-primary);
      padding: 8px 12px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus, select:focus {
      border-color: #7F77DD;
    }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 2px solid #e0e0e0;
      border-top-color: #7F77DD;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
  </style>
</head>
<body>

  <!-- This is where React renders the entire app -->
  <div id="root"></div>

  <!-- Load the React component -->
  <!-- type="text/babel" tells Babel to transform JSX before running -->
  

  <script>
    // Make Recharts available as individual named exports
    // The JSX file uses: import { BarChart, Bar, ... } from "recharts"
    // But since we loaded Recharts via CDN script tag, it is available
    // as a global variable called "Recharts"
    // This block makes the named imports work without a build tool
    window.recharts = window.Recharts;
  </script>

</body>
</html>
